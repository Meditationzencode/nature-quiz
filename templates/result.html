{% extends "layout.html" %}

{% block title %}Nature Quiz - Results{% endblock %}

{% block content %}
<div class="result-screen">
    <h1>Your Results</h1>

    <p class="score">{{ score }} / {{ total_questions }}</p>
    <p class="percentage">{{ percentage }}%</p>
    <p class="result-message">{{ message }}</p>

    <div class="button-group">
        <a class="main-button" href="{{ url_for('start_quiz') }}">Play Again</a>
        <a class="secondary-button" href="{{ url_for('home') }}">Back Home</a>
    </div>
</div>
{% endblock %}
